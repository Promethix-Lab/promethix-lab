name: Promethix Lab CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Automatically caches npm packages between runs

      # 3. Clean install package dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Check for code syntax and linting rules
      - name: Run Linter
        run: npm run lint

            # 5. Verify the Next.js production build compiles successfully
      - name: Build Next.js Application
        run: npm run build
        env:
          STRIPE_SECRET_KEY: "mock_key"
          LOOPS_API_KEY: "mock_key"
          RESEND_API_KEY: "mock_key"
          NEXT_PUBLIC_POSTHOG_KEY: "mock_key"
          # Pass the Sentry Auth Token secret from GitHub Settings
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
